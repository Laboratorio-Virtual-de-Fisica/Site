<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador: Encontro entre Partículas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        padding: 2rem;
        color: #333;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      .inputs {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      label {
        display: flex;
        flex-direction: column;
        font-size: 0.9rem;
      }
      input[type="number"] {
        padding: 0.25rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 6rem;
      }
      button {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        background: #333;
        color: white;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      #animacao {
        position: relative;
        min-height: 300px;
        background: linear-gradient(
          to bottom,
          #87ceeb 0%,
          #87ceeb 60%,
          #90ee90 60%,
          #90ee90 70%,
          #666 70%,
          #666 100%
        );
        border-radius: 15px;
        overflow: hidden;
        margin-bottom: 1rem;
        box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .grass {
        position: absolute;
        bottom: 30%;
        left: 0;
        right: 0;
        height: 10%;
        background: linear-gradient(to bottom, #90ee90, #7bc87b);
      }
      .road {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 30%;
        background: #4a4a4a;
        border-top: 3px solid #666;
      }
      .road-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 4px;
        background: repeating-linear-gradient(
          to right,
          #ffd700 0px,
          #ffd700 40px,
          transparent 40px,
          transparent 80px
        );
      }
      .road-line-1 {
        top: 33%;
      }
      .road-line-2 {
        top: 66%;
      }
      .clouds {
        position: absolute;
        top: 20px;
        left: 0;
        right: 0;
        height: 100px;
      }
      .cloud {
        position: absolute;
        background: white;
        border-radius: 50px;
        opacity: 0.8;
        animation: float 20s infinite linear;
      }
      .cloud:nth-child(1) {
        width: 80px;
        height: 35px;
        top: 10px;
        left: 10%;
        animation-delay: 0s;
      }
      .cloud:nth-child(2) {
        width: 60px;
        height: 25px;
        top: 40px;
        left: 50%;
        animation-delay: -10s;
      }
      .cloud:nth-child(3) {
        width: 70px;
        height: 30px;
        top: 15px;
        left: 80%;
        animation-delay: -5s;
      }
      @keyframes float {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(100vw);
        }
      }
      .car-container {
        position: absolute;
        left: 0;
        z-index: 10;
      }
      .lane-1 {
        bottom: 18%;
      }
      .lane-2 {
        bottom: 4%;
      }
      .car {
        width: 100px;
        height: 50px;
        position: relative;
      }
      .car-body {
        width: 100%;
        height: 30px;
        background: linear-gradient(to bottom, #e74c3c 0%, #c0392b 100%);
        border-radius: 10px 10px 5px 5px;
        position: absolute;
        bottom: 12px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      }
      .car-top {
        width: 60%;
        height: 20px;
        background: linear-gradient(to bottom, #e74c3c 0%, #c0392b 100%);
        border-radius: 8px 8px 0 0;
        position: absolute;
        bottom: 42px;
        left: 20%;
      }
      .car-window {
        width: 90%;
        height: 14px;
        background: rgba(100, 150, 200, 0.6);
        border-radius: 5px 5px 0 0;
        position: absolute;
        bottom: 3px;
        left: 5%;
        border: 2px solid #2c3e50;
      }
      .wheel {
        width: 18px;
        height: 18px;
        background: #2c3e50;
        border-radius: 50%;
        position: absolute;
        bottom: 0;
        border: 3px solid #34495e;
      }
      .wheel-left {
        left: 15px;
      }
      .wheel-right {
        right: 15px;
      }
      .wheel-rim {
        width: 8px;
        height: 8px;
        background: #7f8c8d;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .headlight {
        width: 8px;
        height: 6px;
        background: #f39c12;
        position: absolute;
        bottom: 18px;
        right: 5px;
        border-radius: 2px;
      }
      .car-secondary .car-body,
      .car-secondary .car-top {
        background: linear-gradient(to bottom, #3498db 0%, #2c3e50 100%);
      }
      canvas {
        background: white;
        border: 1px solid #ccc;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Simulador: Encontro entre Partículas</h1>

    <div class="inputs">
      <label
        >Posição Inicial 1 (m)
        <input type="number" id="s1" value="0" />
      </label>
      <label
        >Velocidade 1 (m/s)
        <input type="number" id="v1" value="2" />
      </label>
      <label
        >Aceleração 1 (m/s²)
        <input type="number" id="a1" value="0.5" step="0.1" />
      </label>
      <label
        >Posição Inicial 2 (m)
        <input type="number" id="s2" value="10" />
      </label>
      <label
        >Velocidade 2 (m/s)
        <input type="number" id="v2" value="-1" />
      </label>
      <label
        >Duração (s)
        <input type="number" id="duracao" value="10" />
      </label>
    </div>

    <button onclick="iniciarSimulacao()">Iniciar</button>
    <button onclick="reiniciar()">Reiniciar</button>

    <div id="animacao">
      <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
      </div>
      <div class="grass"></div>
      <div class="road">
        <div class="road-line road-line-1"></div>
        <div class="road-line road-line-2"></div>
      </div>

      <div id="bola1" class="car-container lane-1">
        <div class="car">
          <div class="car-top">
            <div class="car-window"></div>
          </div>
          <div class="car-body">
            <div class="headlight"></div>
          </div>
          <div class="wheel wheel-left">
            <div class="wheel-rim"></div>
          </div>
          <div class="wheel wheel-right">
            <div class="wheel-rim"></div>
          </div>
        </div>
      </div>

      <div id="bola2" class="car-container lane-2">
        <div class="car car-secondary">
          <div class="car-top">
            <div class="car-window"></div>
          </div>
          <div class="car-body">
            <div class="headlight"></div>
          </div>
          <div class="wheel wheel-left">
            <div class="wheel-rim"></div>
          </div>
          <div class="wheel wheel-right">
            <div class="wheel-rim"></div>
          </div>
        </div>
      </div>
    </div>

    <canvas id="grafico"></canvas>

    <script>
      let intervalo = null;
      let chart = null;
      let tempo = [];
      let pos1 = [];
      let pos2 = [];
      let simulando = false;

      function iniciarSimulacao() {
        // Se já está simulando, não reinicia
        if (simulando) return;
        simulando = true;

        // Captura dos dados
        const s1_0 = parseFloat(document.getElementById("s1").value);
        const v1 = parseFloat(document.getElementById("v1").value);
        const a1 = parseFloat(document.getElementById("a1").value);
        const s2_0 = parseFloat(document.getElementById("s2").value);
        const v2 = parseFloat(document.getElementById("v2").value);
        const duracao = parseFloat(document.getElementById("duracao").value);

        const bola1 = document.getElementById("bola1");
        const bola2 = document.getElementById("bola2");

        // Zera variáveis e gráfico
        reiniciar(false);

        tempo = [];
        pos1 = [];
        pos2 = [];

        let t = 0;
        const dt = 0.1;
        const escala = 10; // pixels por metro

        chart = criarGrafico();

        intervalo = setInterval(() => {
          if (t > duracao) {
            pararSimulacao();
            return;
          }

          const s1 = s1_0 + v1 * t + 0.5 * a1 * t * t;
          const s2 = s2_0 + v2 * t;

          tempo.push(t.toFixed(1));
          pos1.push(s1);
          pos2.push(s2);

          bola1.style.left = `${s1 * escala}px`;
          bola2.style.left = `${s2 * escala}px`;

          atualizarGrafico(chart, tempo, pos1, pos2);

          // Encontro detectado
          if (Math.abs(s1 - s2) < 0.1) {
            pararSimulacao();
            alert(
              `As partículas se encontraram em t = ${t.toFixed(
                2,
              )} s, posição = ${s1.toFixed(2)} m`,
            );
            return;
          }

          t += dt;
        }, 100);
      }

      function criarGrafico() {
        const ctx = document.getElementById("grafico");
        return new Chart(ctx, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Partícula 1 (m)",
                data: [],
                borderColor: "#1f77b4",
                fill: false,
                tension: 0.2,
              },
              {
                label: "Partícula 2 (m)",
                data: [],
                borderColor: "#d62728",
                fill: false,
                tension: 0.2,
              },
            ],
          },
          options: {
            animation: false,
            responsive: true,
            scales: {
              x: {
                title: { display: true, text: "Tempo (s)" },
              },
              y: {
                title: { display: true, text: "Posição (m)" },
              },
            },
          },
        });
      }

      function atualizarGrafico(chart, tempo, pos1, pos2) {
        chart.data.labels = tempo;
        chart.data.datasets[0].data = pos1;
        chart.data.datasets[1].data = pos2;
        chart.update("none");
      }

      function pararSimulacao() {
        clearInterval(intervalo);
        intervalo = null;
        simulando = false;
      }

      function reiniciar(destroiGrafico = true) {
        pararSimulacao();

        // Zera posições
        document.getElementById("bola1").style.left = "0px";
        document.getElementById("bola2").style.left = "0px";

        // Zera arrays
        tempo = [];
        pos1 = [];
        pos2 = [];

        // Destroi gráfico se existir
        if (chart && destroiGrafico) {
          chart.destroy();
          chart = null;
        }

        simulando = false;
      }
    </script>
  </body>
</html>
