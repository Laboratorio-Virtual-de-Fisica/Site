<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinemática com Referencial - Visão do Motorista</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 0.5rem;
        color: #333;
      }

      .controls-panel,
      .chart-wrapper {
        background: #f8f9fa;
        border-radius: 15px;
        padding: 1rem;
        margin-bottom: 1rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }

      .controls-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .control-group {
        display: flex;
        flex-direction: column;
      }

      .control-group label {
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #495057;
        font-size: 0.9rem;
      }

      .control-group input {
        padding: 0.75rem;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
      }

      .control-group select {
        padding: 0.75rem;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        background: #fff;
      }

      .button-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      button {
        padding: 0.875rem 2rem;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: #667eea;
        color: #fff;
      }

      .btn-secondary {
        background: #718096;
        color: #fff;
      }

      .btn-danger {
        background: #e53e3e;
        color: #fff;
      }

      .animation-container {
        border-radius: 15px;
        margin-bottom: 1rem;
        min-height: 300px;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.12);
        background: linear-gradient(
          to bottom,
          #87ceeb 0%,
          #87ceeb 60%,
          #90ee90 60%,
          #90ee90 70%,
          #666 70%,
          #666 75%,
          #ffd700 75%,
          #ffd700 76%,
          #666 76%,
          #666 100%
        );
      }

      .clouds {
        position: absolute;
        top: 20px;
        left: -100%;
        width: 300%;
        height: 100px;
      }

      .cloud {
        position: absolute;
        background: white;
        border-radius: 50px;
        opacity: 0.85;
      }

      .cloud:nth-child(1) {
        width: 80px;
        height: 35px;
        top: 10px;
        left: 20%;
      }

      .cloud:nth-child(2) {
        width: 60px;
        height: 25px;
        top: 40px;
        left: 45%;
      }

      .cloud:nth-child(3) {
        width: 70px;
        height: 30px;
        top: 15px;
        left: 72%;
      }

      .grass {
        position: absolute;
        bottom: 30%;
        left: -100%;
        width: 300%;
        height: 10%;
        background: linear-gradient(to bottom, #90ee90, #7bc87b);
      }

      .road {
        position: absolute;
        bottom: 0;
        left: -100%;
        width: 300%;
        height: 30%;
        background: #4a4a4a;
        border-top: 3px solid #666;
      }

      .road-line {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 4px;
        background: repeating-linear-gradient(
          to right,
          #ffd700 0px,
          #ffd700 40px,
          transparent 40px,
          transparent 80px
        );
        transform: translateY(-50%);
      }

      .car-container {
        position: absolute;
        bottom: 10%;
        left: 50px;
        z-index: 10;
      }

      .car {
        width: 100px;
        height: 50px;
        position: relative;
      }

      .car-body {
        width: 100%;
        height: 30px;
        background: linear-gradient(to bottom, #e74c3c 0%, #c0392b 100%);
        border-radius: 10px 10px 5px 5px;
        position: absolute;
        bottom: 12px;
      }

      .car-top {
        width: 60%;
        height: 20px;
        background: linear-gradient(to bottom, #e74c3c 0%, #c0392b 100%);
        border-radius: 8px 8px 0 0;
        position: absolute;
        bottom: 42px;
        left: 20%;
      }

      .car-window {
        width: 90%;
        height: 14px;
        background: rgba(100, 150, 200, 0.6);
        border-radius: 5px 5px 0 0;
        position: absolute;
        bottom: 3px;
        left: 5%;
        border: 2px solid #2c3e50;
      }

      .wheel {
        width: 18px;
        height: 18px;
        background: #2c3e50;
        border-radius: 50%;
        position: absolute;
        bottom: 0;
        border: 3px solid #34495e;
      }

      .wheel-left {
        left: 15px;
      }

      .wheel-right {
        right: 15px;
      }

      .observer-container {
        position: absolute;
        left: 60%;
        bottom: 30%;
        z-index: 10;
        width: 60px;
        text-align: center;
        transform: translateX(0);
      }

      .observer-avatar {
        font-size: 52px;
        line-height: 1;
        user-select: none;
      }

      .selected-reference {
        filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8));
      }

      .info-display {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(255, 255, 255, 0.95);
        padding: 1rem;
        border-radius: 12px;
        min-width: 220px;
        z-index: 20;
      }

      .info-item {
        margin-bottom: 0.75rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .info-label {
        font-weight: 600;
        color: #495057;
      }

      .info-value {
        font-weight: 700;
        color: #667eea;
      }

      .driver-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: 14;
      }

      .side-window-glass {
        position: absolute;
        inset: 7% 8% 19% 8%;
        border-radius: 18px;
        background: linear-gradient(
          to bottom,
          rgba(185, 231, 255, 0.08) 0%,
          rgba(125, 188, 220, 0.04) 42%,
          rgba(40, 66, 91, 0.12) 100%
        );
        border: 2px solid rgba(255, 255, 255, 0.1);
      }

      .window-top-frame {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 10%;
        background: linear-gradient(to bottom, #1b222d, #2b3644);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .window-bottom-frame {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 22%;
        background: linear-gradient(to bottom, #161d27, #0f141d);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .window-pillar-left,
      .window-pillar-right {
        position: absolute;
        top: 0;
        height: 100%;
        width: 9%;
        background: linear-gradient(to bottom, #1c232e, #2f3946);
      }

      .window-pillar-left {
        left: 0;
        clip-path: polygon(0 0, 100% 0, 82% 100%, 0 100%);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }

      .window-pillar-right {
        right: 0;
        clip-path: polygon(18% 0, 100% 0, 100% 100%, 0 100%);
        border-left: 1px solid rgba(255, 255, 255, 0.08);
      }

      .window-reflection {
        position: absolute;
        top: 12%;
        left: 20%;
        width: 22%;
        height: 58%;
        transform: skewX(-12deg);
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0.02)
        );
        border-radius: 6px;
        filter: blur(0.3px);
      }

      .window-reflection.r2 {
        left: auto;
        right: 23%;
        width: 14%;
        height: 48%;
        transform: skewX(-9deg);
      }

      .inner-door-shadow {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 22%;
        height: 18%;
        background: linear-gradient(
          to top,
          rgba(13, 18, 25, 0.35),
          rgba(13, 18, 25, 0)
        );
      }

      .observer-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: 13;
      }

      .observer-ground-shadow {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 24%;
        background: linear-gradient(
          to top,
          rgba(10, 14, 20, 0.45),
          rgba(10, 14, 20, 0)
        );
      }

      .observer-silhouette {
        position: absolute;
        left: 4%;
        bottom: 12%;
        width: 90px;
        height: 150px;
        opacity: 0.85;
      }

      .observer-silhouette-head {
        position: absolute;
        top: 0;
        left: 28px;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: #1e2430;
      }

      .observer-silhouette-body {
        position: absolute;
        top: 26px;
        left: 8px;
        width: 74px;
        height: 116px;
        background: #1a212c;
        border-radius: 36px 36px 18px 18px;
      }

      .observer-caption {
        position: absolute;
        left: 14px;
        bottom: -16px;
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.88);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
      }

      .animation-container.driver-view .driver-overlay {
        opacity: 1;
      }

      .animation-container.driver-view .car-container {
        opacity: 0;
      }

      .animation-container.observer-view .observer-overlay {
        opacity: 1;
      }

      .animation-container.observer-view .observer-container {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div class="controls-panel">
      <div class="controls-grid">
        <div class="control-group">
          <label for="viewMode">Modo de Visão (antes de iniciar)</label>
          <select id="viewMode">
            <option value="motorista">Motorista (olhando pela janela)</option>
            <option value="bonequinho">
              Bonequinho (vendo o carro passar)
            </option>
          </select>
        </div>
        <div class="control-group">
          <label for="posicao">Posição Inicial (m)</label>
          <input type="number" id="posicao" value="0" step="0.1" />
        </div>
        <div class="control-group">
          <label for="velocidade">Velocidade Inicial (m/s)</label>
          <input type="number" id="velocidade" value="10" step="0.1" />
        </div>
        <div class="control-group">
          <label for="aceleracao">Aceleração (m/s²)</label>
          <input type="number" id="aceleracao" value="0" step="0.1" />
        </div>
        <div class="control-group">
          <label for="duracao">Duração (s)</label>
          <input type="number" id="duracao" value="10" step="0.1" min="1" />
        </div>
      </div>

      <div class="button-group">
        <button class="btn-primary" onclick="iniciarSimulacao()">
          ▶️ Iniciar
        </button>
        <button
          class="btn-secondary"
          onclick="pausarSimulacao()"
          id="pauseBtn"
          disabled
        >
          ⏸️ Pausar
        </button>
        <button class="btn-danger" onclick="reiniciar()">🔄 Reiniciar</button>
      </div>
    </div>

    <div class="animation-container" id="animationContainer">
      <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
      </div>
      <div class="grass"></div>
      <div class="road">
        <div class="road-line"></div>
      </div>

      <div class="car-container" id="carContainer">
        <div class="car">
          <div class="car-top"><div class="car-window"></div></div>
          <div class="car-body"></div>
          <div class="wheel wheel-left"></div>
          <div class="wheel wheel-right"></div>
        </div>
      </div>

      <div class="observer-container" id="observerContainer">
        <div class="observer-avatar" id="observerAvatar">🧍</div>
      </div>

      <div class="driver-overlay">
        <div class="side-window-glass"></div>
        <div class="window-top-frame"></div>
        <div class="window-bottom-frame"></div>
        <div class="window-pillar-left"></div>
        <div class="window-pillar-right"></div>
        <div class="window-reflection"></div>
        <div class="window-reflection r2"></div>
        <div class="inner-door-shadow"></div>
      </div>

      <div class="observer-overlay">
        <div class="observer-ground-shadow"></div>
        <div class="observer-silhouette">
          <div class="observer-silhouette-head"></div>
          <div class="observer-silhouette-body"></div>
          <div class="observer-caption">Visão do observador</div>
        </div>
      </div>

      <div class="info-display">
        <div class="info-item">
          <span class="info-label">Referência:</span>
          <span class="info-value" id="displayReferencia">🚗 Motorista</span>
        </div>
        <div class="info-item">
          <span class="info-label">Tempo:</span>
          <span class="info-value" id="displayTempo">0.0 s</span>
        </div>
        <div class="info-item">
          <span class="info-label">Posição:</span>
          <span class="info-value" id="displayPosicao">0.0 m</span>
        </div>
        <div class="info-item">
          <span class="info-label">Velocidade:</span>
          <span class="info-value" id="displayVelocidade">0.0 m/s</span>
        </div>
        <div class="info-item">
          <span class="info-label">Aceleração:</span>
          <span class="info-value" id="displayAceleracao">0.0 m/s²</span>
        </div>
      </div>
    </div>

    <div class="chart-wrapper">
      <canvas id="grafico"></canvas>
    </div>

    <script>
      const animationContainer = document.getElementById("animationContainer");
      const carContainer = document.getElementById("carContainer");
      const observerContainer = document.getElementById("observerContainer");
      const observerAvatar = document.getElementById("observerAvatar");
      const roadEl = document.querySelector(".road");
      const grassEl = document.querySelector(".grass");
      const cloudsEl = document.querySelector(".clouds");
      const grafico = document.getElementById("grafico");
      const pauseBtn = document.getElementById("pauseBtn");
      const viewModeSelect = document.getElementById("viewMode");

      let chart;
      let intervalo;
      let pausado = false;
      let tempo = [];
      let posicoes = [];
      let velocidades = [];
      let aceleracoes = [];
      let t = 0;
      const dt = 0.05;
      let duracao, s0, v0, a;
      let toPx = null;
      let referencialAtual = "carro";
      let modoVisaoAtual = "motorista";

      function aplicarVisualReferencial() {
        if (modoVisaoAtual === "motorista") {
          animationContainer.classList.add("driver-view");
          animationContainer.classList.remove("observer-view");
          document.getElementById("displayReferencia").textContent =
            "🚗 Motorista";
          carContainer.classList.add("selected-reference");
          observerContainer.classList.remove("selected-reference");
        } else {
          animationContainer.classList.remove("driver-view");
          animationContainer.classList.add("observer-view");
          document.getElementById("displayReferencia").textContent =
            "🧍 Observador";
          observerContainer.classList.add("selected-reference");
          carContainer.classList.remove("selected-reference");
        }
      }

      function definirModoVisao(valorModo) {
        modoVisaoAtual =
          valorModo === "bonequinho" ? "bonequinho" : "motorista";
        referencialAtual = modoVisaoAtual === "motorista" ? "carro" : "pessoa";
        aplicarVisualReferencial();
        if (t > 0 && t < duracao) {
          alert("⚠️ Reinicie a simulação para aplicar o novo referencial!");
        }
      }

      function atualizarDisplay(s, v, aAtual, tempoAtual) {
        document.getElementById("displayTempo").textContent =
          tempoAtual.toFixed(1) + " s";
        document.getElementById("displayPosicao").textContent =
          s.toFixed(2) + " m";
        document.getElementById("displayVelocidade").textContent =
          v.toFixed(2) + " m/s";
        document.getElementById("displayAceleracao").textContent =
          aAtual.toFixed(2) + " m/s²";
      }

      function extremosDeS(sInicial, vInicial, aceleracao, T) {
        const valores = [
          sInicial,
          sInicial + vInicial * T + 0.5 * aceleracao * T * T,
        ];
        if (aceleracao !== 0) {
          const tVertice = -vInicial / aceleracao;
          if (tVertice > 0 && tVertice < T) {
            valores.push(
              sInicial +
                vInicial * tVertice +
                0.5 * aceleracao * tVertice * tVertice,
            );
          }
        }
        return { min: Math.min(...valores), max: Math.max(...valores) };
      }

      function iniciarSimulacao() {
        definirModoVisao(viewModeSelect.value);

        s0 = parseFloat(document.getElementById("posicao").value);
        v0 = parseFloat(document.getElementById("velocidade").value);
        a = parseFloat(document.getElementById("aceleracao").value);
        duracao = parseFloat(document.getElementById("duracao").value);

        tempo = [];
        posicoes = [];
        velocidades = [];
        aceleracoes = [];
        t = 0;

        const parent = carContainer.parentElement;
        const pxZero = 50;
        const pxMax = Math.max(parent.offsetWidth - 12, pxZero + 1);
        const carWidth = carContainer.offsetWidth || 100;
        const ext = extremosDeS(s0, v0, a, duracao);
        const sMaxPos = Math.max(0, ext.max);
        const pxPerMeter = (pxMax - pxZero - carWidth) / Math.max(sMaxPos, 1);
        toPx = (s) => pxZero + s * pxPerMeter;
        carContainer.style.left = `${toPx(s0) - carWidth}px`;

        roadEl.style.transform = "translateX(0)";
        grassEl.style.transform = "translateX(0)";
        cloudsEl.style.transform = "translateX(0)";
        observerContainer.style.transform = "translateX(0)";

        clearInterval(intervalo);
        pauseBtn.disabled = false;
        pauseBtn.textContent = "⏸️ Pausar";
        pausado = false;

        if (chart) chart.destroy();
        grafico.height = 600;
        chart = new Chart(grafico, {
          type: "line",
          data: {
            labels: tempo,
            datasets: [
              {
                label: "Posição (m)",
                data: posicoes,
                yAxisID: "yPos",
                borderColor: "#667eea",
                backgroundColor: "rgba(102,126,234,0.15)",
                fill: true,
                tension: 0.25,
                borderWidth: 3,
                pointRadius: 0,
              },
              {
                label: "Velocidade (m/s)",
                data: velocidades,
                yAxisID: "yVel",
                borderColor: "#2ecc71",
                fill: false,
                tension: 0.25,
                borderWidth: 3,
                pointRadius: 0,
              },
              {
                label: "Aceleração (m/s²)",
                data: aceleracoes,
                yAxisID: "yAcc",
                borderColor: "#e74c3c",
                fill: false,
                tension: 0.25,
                borderWidth: 3,
                pointRadius: 0,
              },
            ],
          },
          options: {
            animation: false,
            normalized: true,
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { ticks: { autoSkip: true, maxTicksLimit: 12 } },
              yPos: {
                type: "linear",
                position: "left",
                title: { display: true, text: "Posição (m)" },
              },
              yVel: {
                type: "linear",
                position: "right",
                title: { display: true, text: "Velocidade (m/s)" },
                grid: { drawOnChartArea: false },
              },
              yAcc: {
                type: "linear",
                position: "right",
                title: { display: true, text: "Aceleração (m/s²)" },
                grid: { drawOnChartArea: false },
              },
            },
          },
        });

        atualizarDisplay(s0, v0, a, 0);
        aplicarVisualReferencial();
        rodarSimulacao();
      }

      function rodarSimulacao() {
        intervalo = setInterval(() => {
          if (t > duracao) {
            clearInterval(intervalo);
            pauseBtn.disabled = true;
            return;
          }

          const s = s0 + v0 * t + 0.5 * a * t * t;
          const v = v0 + a * t;

          const parent = carContainer.parentElement;
          const observerPxPosition = parent.offsetWidth * 0.75;
          const observerMetersPosition =
            observerPxPosition / (toPx(1) - toPx(0));

          if (s > observerMetersPosition) observerAvatar.textContent = "🚶";
          else observerAvatar.textContent = "🧍";

          tempo.push(t.toFixed(2));
          posicoes.push(parseFloat(s.toFixed(2)));
          velocidades.push(parseFloat(v.toFixed(2)));
          aceleracoes.push(a);

          if (referencialAtual === "pessoa") {
            const frontX = toPx(s);
            const leftX = frontX - (carContainer.offsetWidth || 100);
            carContainer.style.left = `${leftX}px`;
            roadEl.style.transform = "translateX(0)";
            grassEl.style.transform = "translateX(0)";
            cloudsEl.style.transform = "translateX(0)";
            observerContainer.style.transform = "translateX(0)";
          } else {
            const frontX = toPx(s);
            const leftX = frontX - (carContainer.offsetWidth || 100);
            const posicaoFixaCarro =
              parent.offsetWidth / 2 - (carContainer.offsetWidth || 100);
            carContainer.style.left = `${posicaoFixaCarro}px`;

            const deslocamento = -(leftX - posicaoFixaCarro);
            roadEl.style.transform = `translateX(${deslocamento}px)`;
            grassEl.style.transform = `translateX(${deslocamento}px)`;
            cloudsEl.style.transform = `translateX(${deslocamento * 0.35}px)`;
            observerContainer.style.transform = `translateX(${deslocamento}px)`;
          }

          atualizarDisplay(s, v, a, t);
          chart.data.labels = tempo;
          chart.data.datasets[0].data = posicoes;
          chart.data.datasets[1].data = velocidades;
          chart.data.datasets[2].data = aceleracoes;
          chart.update("none");

          t += dt;
        }, 50);
      }

      function pausarSimulacao() {
        if (!pausado) {
          clearInterval(intervalo);
          pausado = true;
          pauseBtn.textContent = "▶️ Continuar";
        } else {
          pausado = false;
          pauseBtn.textContent = "⏸️ Pausar";
          rodarSimulacao();
        }
      }

      function reiniciar() {
        clearInterval(intervalo);
        carContainer.style.left = "50px";
        roadEl.style.transform = "translateX(0)";
        grassEl.style.transform = "translateX(0)";
        cloudsEl.style.transform = "translateX(0)";
        observerContainer.style.transform = "translateX(0)";
        if (chart) chart.destroy();
        pauseBtn.disabled = true;
        pauseBtn.textContent = "⏸️ Pausar";
        pausado = false;
        t = 0;
        atualizarDisplay(0, 0, 0, 0);
        definirModoVisao(viewModeSelect.value);
        aplicarVisualReferencial();
      }

      window.addEventListener("load", () => {
        definirModoVisao(viewModeSelect.value);
        viewModeSelect.addEventListener("change", () => {
          if (t > 0 && t < duracao) {
            viewModeSelect.value = modoVisaoAtual;
            alert("⚠️ Reinicie a simulação para trocar o modo de visão.");
            return;
          }
          definirModoVisao(viewModeSelect.value);
        });
      });
    </script>
  </body>
</html>
